name: Update README stats cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: >-
            username=Dibyasachi1&show_icons=true&hide_border=true&bg_color=0B1021&title_color=38BDF8&icon_color=E879F9&text_color=C7D2FE&ring_color=818CF8&count_private=true
          path: assets/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >-
            username=Dibyasachi1&layout=compact&hide_border=true&bg_color=0B1021&title_color=38BDF8&text_color=C7D2FE&langs_count=8
          path: assets/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git commit -m "chore: refresh GitHub stats cards" || exit 0
          git push
